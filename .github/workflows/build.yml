name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: 17

    - name: Build APK
      run: |
        chmod +x gradlew
        ./gradlew build

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: QRNeonAPK
        path: app/build/outputs/apk/debug/
